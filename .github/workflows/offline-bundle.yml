name: Offline Bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

env:
  REPO: hlvm-dev/hlvm
  HF_REPO: HLVM/hlvm-releases

jobs:
  bundle:
    name: Build offline bundle (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-aarch64
            binary: hlvm-mac-arm

          - os: macos-15-intel
            platform: darwin-x86_64
            binary: hlvm-mac-intel

          - os: ubuntu-latest
            platform: linux-x86_64
            binary: hlvm-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo "${{ env.REPO }}" \
            --pattern "${{ matrix.binary }}*" \
            --dir .
          bash scripts/assemble-release-binary.sh . "${{ matrix.binary }}" ./hlvm
          chmod +x hlvm

      - name: Package offline bundle
        run: |
          deno run -A scripts/package-offline-bundle.ts ./hlvm . \
            "hlvm-${{ inputs.tag }}-${{ matrix.platform }}-full.tar.gz"

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "").strip()
          if not token:
              raise SystemExit("HF_TOKEN is required to publish offline bundles.")

          tag = "${{ inputs.tag }}"
          platform = "${{ matrix.platform }}"
          bundle = f"hlvm-{tag}-{platform}-full.tar.gz"
          if not os.path.exists(bundle):
              raise SystemExit(f"No bundle found at {bundle}.")

          destination = bundle
          api = HfApi(token=token)
          api.upload_file(
              path_or_fileobj=bundle,
              path_in_repo=destination,
              repo_id="${{ env.HF_REPO }}",
              repo_type="model",
              commit_message=f"Add {destination}",
          )
          print(f"Uploaded {destination} to ${{{{ env.HF_REPO }}}}.")
          PY
