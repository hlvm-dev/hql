name: Release Proof

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to prove (for example v0.1.0)
        required: true
        type: string
      mode:
        description: Whether to prove draft assets or the published public release
        required: true
        type: choice
        options:
          - staged
          - public
  release:
    types:
      - edited
      - published

permissions:
  contents: read

env:
  REPO: hlvm-dev/hql
  SMOKE_PROMPT: hello

jobs:
  resolve:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.action == 'published' || github.event.release.draft == true }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      mode: ${{ steps.resolve.outputs.mode }}
    steps:
      - id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.action }}" = "published" ]; then
            echo "mode=public" >> "$GITHUB_OUTPUT"
          else
            echo "mode=staged" >> "$GITHUB_OUTPUT"
          fi

  unix:
    needs: resolve
    name: Unix ${{ matrix.platform }} (${{ needs.resolve.outputs.mode }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-aarch64
          - os: macos-15-intel
            platform: darwin-x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Validate published latest tag
        if: needs.resolve.outputs.mode == 'public'
        shell: bash
        run: |
          actual=$(curl -fsSL "https://api.github.com/repos/${{ env.REPO }}/releases/latest" | jq -r '.tag_name')
          [ "$actual" = "${{ needs.resolve.outputs.tag }}" ]

      - name: Staged Unix smoke
        if: needs.resolve.outputs.mode == 'staged'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          HLVM_SMOKE_REPO: ${{ env.REPO }}
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: |
          sh scripts/release-smoke.sh standard "${{ needs.resolve.outputs.tag }}"

      - name: Public Unix smoke
        if: needs.resolve.outputs.mode == 'public'
        shell: bash
        env:
          HLVM_PUBLIC_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: |
          sh scripts/public-release-smoke.sh standard

  windows:
    needs: resolve
    name: Windows x86_64 (${{ needs.resolve.outputs.mode }})
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Windows smoke
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          HLVM_SMOKE_REPO: ${{ env.REPO }}
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: |
          ./scripts/release-smoke.ps1 -Mode "${{ needs.resolve.outputs.mode }}" -Tag "${{ needs.resolve.outputs.tag }}"
