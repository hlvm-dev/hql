name: Publish Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Draft release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

env:
  REPO: hlvm-dev/hql
  HF_REPO: HLVM/hlvm-releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate draft release assets
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          gh release view "${{ inputs.tag }}" \
            --repo "${{ env.REPO }}" \
            --json isDraft,assets \
            > release.json

          jq -e '.isDraft == true' release.json >/dev/null

          has_asset() {
            jq -e --arg name "$1" '.assets[] | select(.name == $name)' release.json >/dev/null
          }

          has_direct_or_split_asset() {
            name="$1"
            if has_asset "$name"; then
              return 0
            fi

            jq -e --arg prefix "${name}.part-" \
              '[.assets[] | select(.name | startswith($prefix))] | length > 0' \
              release.json \
              >/dev/null
          }

          for asset in \
            hlvm-mac-arm \
            hlvm-mac-intel \
            checksums.sha256 \
            install.sh \
            install.ps1
          do
            has_asset "$asset"
          done

          has_direct_or_split_asset hlvm-linux
          has_direct_or_split_asset hlvm-windows.exe

      - name: Validate installer URLs
        run: |
          curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --head https://hlvm.dev/install.sh >/dev/null
          curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            --head https://hlvm.dev/install.ps1 >/dev/null

      - name: Validate offline bundles
        run: |
          for platform in darwin-aarch64 darwin-x86_64 linux-x86_64
          do
            curl --fail --silent --show-error --location \
              --retry 5 --retry-delay 2 --retry-all-errors \
              --head \
              "https://huggingface.co/${{ env.HF_REPO }}/resolve/main/hlvm-${{ inputs.tag }}-${platform}-full.tar.gz" \
              >/dev/null
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" \
            --repo "${{ env.REPO }}" \
            --draft=false
