name: Publish Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Draft release tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

env:
  REPO: ${{ github.repository }}
  HF_REPO: HLVM/hlvm-releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate draft release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ inputs.tag }}" \
            --repo "${{ env.REPO }}" \
            --json isDraft,assets \
            > release.json

          jq -e '.isDraft == true' release.json >/dev/null

          for asset in \
            hlvm-mac-arm \
            hlvm-mac-intel \
            hlvm-linux \
            hlvm-windows.exe \
            checksums.sha256 \
            install.sh \
            install.ps1
          do
            jq -e --arg name "$asset" '.assets[] | select(.name == $name)' release.json >/dev/null
          done

      - name: Validate installer URLs
        run: |
          curl -fsSLI https://hlvm.dev/install.sh >/dev/null
          curl -fsSLI https://hlvm.dev/install.ps1 >/dev/null

      - name: Validate offline bundles
        run: |
          for platform in darwin-aarch64 darwin-x86_64 linux-x86_64
          do
            curl -fsSLI \
              "https://huggingface.co/${{ env.HF_REPO }}/resolve/main/hlvm-${{ inputs.tag }}-${platform}-full.tar.gz" \
              >/dev/null
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" \
            --repo "${{ env.REPO }}" \
            --draft=false
