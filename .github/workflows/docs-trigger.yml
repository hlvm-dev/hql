name: Trigger Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs-updated event to hlvm-web
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HLVM_WEB_DISPATCH_TOKEN }}
          repository: hlvm-dev/hlvm-web
          event-type: docs-updated
