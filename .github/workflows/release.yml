name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.0, v1.0.0, etc.

permissions:
  contents: write  # Required to create releases and upload assets

env:
  EMBEDDED_OLLAMA_VERSION_FILE: embedded-ollama-version.txt
  MAX_RELEASE_ASSET_BYTES: 1900000000

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS ARM (Apple Silicon M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hlvm-mac-arm
            ollama_asset: ollama-darwin.tgz
            ollama_binary: ollama

          # macOS Intel
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: hlvm-mac-intel
            ollama_asset: ollama-darwin.tgz
            ollama_binary: ollama

          # Linux
          - os: macos-latest
            target: x86_64-unknown-linux-gnu
            binary: hlvm-linux
            ollama_asset: ollama-linux-amd64.tar.zst
            ollama_binary: bin/ollama

          # Windows
          - os: macos-latest
            target: x86_64-pc-windows-msvc
            binary: hlvm-windows.exe
            ollama_asset: ollama-windows-amd64.zip
            ollama_binary: ollama.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Load embedded Ollama version
        shell: bash
        run: |
          echo "OLLAMA_VERSION=$(tr -d '\n' < "${{ env.EMBEDDED_OLLAMA_VERSION_FILE }}")" >> "$GITHUB_ENV"

      - name: Ensure zstd is available
        if: endsWith(matrix.ollama_asset, '.tar.zst')
        shell: bash
        run: |
          if command -v zstd >/dev/null 2>&1; then
            zstd --version
            exit 0
          fi

          if command -v brew >/dev/null 2>&1; then
            brew install zstd
            zstd --version
            exit 0
          fi

          echo "zstd is required to extract ${{ matrix.ollama_asset }}"
          exit 1

      - name: Download Ollama runtime (pinned ${{ env.OLLAMA_VERSION }})
        shell: bash
        run: |
          mkdir -p resources/ai-engine
          ARCHIVE_PATH="resources/${{ matrix.ollama_asset }}"
          curl -fsSL -o "$ARCHIVE_PATH" \
            "https://github.com/ollama/ollama/releases/download/${{ env.OLLAMA_VERSION }}/${{ matrix.ollama_asset }}"

          case "${{ matrix.ollama_asset }}" in
            *.tgz)
              tar -xzf "$ARCHIVE_PATH" -C resources/ai-engine
              ;;
            *.tar.zst)
              zstd -dc "$ARCHIVE_PATH" | tar -xf - -C resources/ai-engine
              ;;
            *.zip)
              unzip -q "$ARCHIVE_PATH" -d resources/ai-engine
              ;;
            *)
              echo "Unsupported Ollama archive: ${{ matrix.ollama_asset }}"
              exit 1
              ;;
          esac

          rm -f "$ARCHIVE_PATH"
          deno run -A scripts/write-ai-engine-manifest.ts resources/ai-engine
          chmod +x "resources/ai-engine/${{ matrix.ollama_binary }}" 2>/dev/null || true
          ls -lah resources/ai-engine

      - name: Build stdlib
        run: deno run -A scripts/build-stdlib.ts

      - name: Embed HLVM packages
        run: deno run --allow-read --allow-write scripts/embed-packages.ts

      - name: Build binary
        shell: bash
        run: |
          ./scripts/compile-hlvm.sh \
            --target ${{ matrix.target }} \
            --output ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries to root
        run: |
          mv artifacts/hlvm-mac-arm/hlvm-mac-arm .
          mv artifacts/hlvm-mac-intel/hlvm-mac-intel .
          mv artifacts/hlvm-linux/hlvm-linux .
          mv artifacts/hlvm-windows.exe/hlvm-windows.exe .
          chmod +x hlvm-mac-arm hlvm-mac-intel hlvm-linux

      - name: Generate checksums
        run: |
          sha256sum hlvm-mac-arm hlvm-mac-intel hlvm-linux hlvm-windows.exe > checksums.sha256
          echo "Generated checksums:"
          cat checksums.sha256

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-assets

          stage_binary() {
            binary=$1
            size=$(stat -c%s "$binary")

            if [ "$size" -gt "${{ env.MAX_RELEASE_ASSET_BYTES }}" ]; then
              echo "Splitting ${binary} (${size} bytes) into release parts..."
              split -b "${{ env.MAX_RELEASE_ASSET_BYTES }}" -d -a 3 "$binary" "release-assets/${binary}.part-"
            else
              echo "Staging ${binary} (${size} bytes) as a direct release asset..."
              mv "$binary" "release-assets/${binary}"
            fi
          }

          stage_binary hlvm-mac-arm
          stage_binary hlvm-mac-intel
          stage_binary hlvm-linux
          stage_binary hlvm-windows.exe

          mv install.sh install.ps1 checksums.sha256 release-assets/

          echo "Release assets:"
          ls -lah release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            # HLVM ${{ github.ref_name }}

            AI-native runtime infrastructure with embedded local AI.

            ## Installation

            **Standard (recommended):**
            ```bash
            curl -fsSL https://hlvm.dev/install.sh | sh
            ```

            Downloads the GitHub Release binary and prepares the local AI fallback during install.

            **Full Offline:**
            ```bash
            curl -fsSL https://hlvm.dev/install.sh | sh -s -- --full
            ```

            Larger download. No post-download network dependency after the bundle is downloaded.

            **Windows (PowerShell):**
            ```powershell
            irm https://hlvm.dev/install.ps1 | iex
            ```

            After install, `hlvm ask "hello"` works immediately.

            ## What's Included

            - HLVM runtime platform with embedded AI engine
            - HQL and JavaScript REPL
            - Complete standard library
            - AI agent SDK with MCP tool servers
            - Local fallback model prepared during install

            ## Binaries

            - `hlvm-mac-arm` - macOS Apple Silicon (M1/M2/M3)
            - `hlvm-mac-intel` - macOS Intel
            - `hlvm-linux` - Linux x86_64 (published as split GitHub assets when needed)
            - `hlvm-windows.exe` - Windows x86_64 (published as split GitHub assets when needed)

            ## Quick Start

            ```bash
            # AI assistant
            hlvm ask "hello"

            # Start REPL
            hlvm repl

            # Run a file
            hlvm run hello.hql

            # Show help
            hlvm --help
            ```
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
