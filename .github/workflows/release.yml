name: Release

# One tag, one workflow: build → draft → staged proof → publish → public proof
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing draft release tag (e.g. v0.2.0). Skips build, runs proof → publish → public proof.'
        required: true
        type: string

permissions:
  contents: write

env:
  PUBLIC_RELEASE_REPO: hlvm-dev/hql
  SMOKE_PROMPT: hello

jobs:
  # ─── Resolve release tag from trigger ───────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Phase 1: Build (tag push only) ─────────────────────────────────────
  build:
    if: github.event_name == 'push'
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hlvm-mac-arm

          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: hlvm-mac-intel

          - os: macos-latest
            target: x86_64-unknown-linux-gnu
            binary: hlvm-linux

          - os: macos-latest
            target: x86_64-pc-windows-msvc
            binary: hlvm-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Build stdlib
        run: bash scripts/with-retry.sh --attempts 3 --delay 5 -- deno run -A scripts/build-stdlib.ts

      - name: Embed HLVM packages
        run: bash scripts/with-retry.sh --attempts 3 --delay 5 -- deno run --allow-read --allow-write scripts/embed-packages.ts

      - name: Build binary
        run: ./scripts/compile-hlvm.sh --target "${{ matrix.target }}" --output "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  # ─── Phase 2: Create draft release (tag push only) ──────────────────────
  create-release:
    if: github.event_name == 'push'
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum hlvm-mac-arm hlvm-mac-intel hlvm-linux hlvm-windows.exe > checksums.sha256
          echo "Generated checksums:"
          cat checksums.sha256

      - name: Add installer scripts
        run: cp install.sh install.ps1 release-assets/

      - name: Show release assets
        run: ls -lah release-assets

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          if gh release view "$TAG" --repo "${{ env.PUBLIC_RELEASE_REPO }}" >/dev/null 2>&1; then
            gh release delete "$TAG" --repo "${{ env.PUBLIC_RELEASE_REPO }}" --yes
          fi

          gh release create "$TAG" \
            --repo "${{ env.PUBLIC_RELEASE_REPO }}" \
            --draft \
            --generate-notes \
            --title "HLVM $TAG"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          for asset in release-assets/*; do
            gh release upload "${{ github.ref_name }}" "$asset" \
              --repo "${{ env.PUBLIC_RELEASE_REPO }}" \
              --clobber
          done

  # ─── Phase 3: Staged smoke test ─────────────────────────────────────────
  staged-unix:
    name: Staged smoke ${{ matrix.platform }}
    needs: [resolve, create-release]
    if: |
      !cancelled() &&
      needs.resolve.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-aarch64
            allow_failure: true
          - os: macos-15-intel
            platform: darwin-x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            allow_failure: true
    steps:
      - uses: actions/checkout@v4
      - name: Staged Unix smoke
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          HLVM_SMOKE_REPO: hlvm-dev/hql
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: sh scripts/release-smoke.sh "${{ needs.resolve.outputs.tag }}"

  staged-windows:
    name: Staged smoke windows
    needs: [resolve, create-release]
    continue-on-error: true
    if: |
      !cancelled() &&
      needs.resolve.result == 'success' &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Windows staged smoke
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          HLVM_SMOKE_REPO: hlvm-dev/hql
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: ./scripts/release-smoke.ps1 -Mode "staged" -Tag "${{ needs.resolve.outputs.tag }}"

  # ─── Phase 4: Publish draft → live ──────────────────────────────────────
  publish:
    name: Publish Release
    needs: [resolve, staged-unix, staged-windows]
    if: |
      !cancelled() &&
      needs.staged-unix.result == 'success' &&
      needs.staged-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Validate draft release assets
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          gh release view "$TAG" \
            --repo "${{ env.PUBLIC_RELEASE_REPO }}" \
            --json isDraft,assets > release.json

          jq -e '.isDraft == true' release.json >/dev/null

          for asset in hlvm-mac-arm hlvm-mac-intel hlvm-linux hlvm-windows.exe checksums.sha256 install.sh install.ps1; do
            jq -e --arg name "$asset" '.assets[] | select(.name == $name)' release.json >/dev/null
          done

      - name: Validate installer URLs
        run: |
          curl --fail --silent --head https://hlvm.dev/install.sh >/dev/null
          curl --fail --silent --head https://hlvm.dev/install.ps1 >/dev/null

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: |
          gh release edit "${{ needs.resolve.outputs.tag }}" \
            --repo "${{ env.PUBLIC_RELEASE_REPO }}" \
            --draft=false

  # ─── Phase 5: Public smoke test ─────────────────────────────────────────
  public-unix:
    name: Public smoke ${{ matrix.platform }}
    needs: [resolve, publish]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-aarch64
            allow_failure: true
          - os: macos-15-intel
            platform: darwin-x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            allow_failure: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate published release
        run: |
          actual=$(curl -fsSL "https://api.github.com/repos/${{ env.PUBLIC_RELEASE_REPO }}/releases/latest" | jq -r '.tag_name')
          [ "$actual" = "${{ needs.resolve.outputs.tag }}" ]
      - name: Public Unix smoke
        env:
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: sh scripts/public-release-smoke.sh

  public-windows:
    name: Public smoke windows
    needs: [resolve, publish]
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Windows public smoke
        env:
          HLVM_SMOKE_PROMPT: ${{ env.SMOKE_PROMPT }}
        run: ./scripts/release-smoke.ps1 -Mode "public" -Tag "${{ needs.resolve.outputs.tag }}"
