name: Release Bundled

# Manual trigger only — never blocks standard release.
# Pulls the model, packages Chromium, creates sidecar tarballs, uploads to HuggingFace.
# NOTE: Chromium tarball is macOS-only (built on macos-latest / Apple Silicon).
# Linux/Windows users get a graceful fallback — Chromium downloads from CDN at bootstrap.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0) — used as HuggingFace revision'
        required: true
        type: string

permissions:
  contents: read

env:
  EMBEDDED_OLLAMA_VERSION_FILE: embedded-ollama-version.txt

jobs:
  package-and-upload:
    name: Package sidecar tarballs + upload to HuggingFace
    runs-on: macos-latest
    continue-on-error: true
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup AI engine
        shell: bash
        run: make setup-ai

      - name: Pull model for bundled tarball
        shell: bash
        run: make setup-model

      - name: Package sidecar model tarball
        shell: bash
        run: make package-bundled-model

      - name: Setup and package Chromium
        shell: bash
        run: |
          make setup-chromium
          make package-bundled-chromium

      - name: Show tarball sizes
        run: ls -lh hlvm-model.tar hlvm-chromium.tar.gz

      - name: Upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -m venv /tmp/hf-venv
          /tmp/hf-venv/bin/pip install huggingface-hub
          export PATH="/tmp/hf-venv/bin:$PATH"
          ./scripts/upload-bundled.sh ${{ inputs.tag }} ./hlvm-model.tar ./hlvm-chromium.tar.gz
