name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Run unit tests
        run: deno task test:unit

      - name: Run compatibility tests
        run: deno task test:compat

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Check platform abstraction
        run: deno task check:platform

      - name: SSOT enforcement check
        run: deno task ssot:check
        # Strict enforcement via MIGRATION_ALLOWLIST in scripts/ssot-check.ts

  mcp-conformance:
    name: MCP Conformance
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Conformance tests
        run: deno task test:conformance

      - name: Interop tests
        run: deno task test:interop

  website:
    name: Website checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Sync docs
        run: node website/scripts/sync-docs.mjs

      - name: Lint
        working-directory: website
        run: npm run lint

      - name: Test
        working-directory: website
        run: npm test

      - name: Build
        working-directory: website
        run: npm run build
