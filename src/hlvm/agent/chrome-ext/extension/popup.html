<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.disconnected {
      background: #fbe9e7;
      color: #c62828;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #4caf50; }
    .disconnected .dot { background: #ef5350; }
    .info {
      color: #666;
      font-size: 11px;
      line-height: 1.5;
    }
    .info dt {
      font-weight: 600;
      color: #333;
    }
    .info dd {
      margin: 0 0 4px 0;
    }
  </style>
</head>
<body>
  <h1>HLVM Browser Bridge</h1>
  <div id="status" class="status disconnected">
    <span class="dot"></span>
    <span id="status-text">Checking...</span>
  </div>
  <dl class="info">
    <dt>Extension Version</dt>
    <dd id="version">1.0.0</dd>
    <dt>Active Tab</dt>
    <dd id="active-tab">None</dd>
  </dl>
  <script src="popup.js"></script>
</body>
</html>
